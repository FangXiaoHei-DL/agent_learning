<svg width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8AA4CC"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#B7C5D8" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="980" height="560" rx="28" fill="#F8FBFF"/>
  <text x="490" y="52" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#243B64">从聊天模型到 AI 工具：应该选哪个？</text>
  <text x="490" y="84" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#5E6D82">模型是“大脑”，Agent 工具是“手脚 + 工作台 + 记忆 + 权限控制”</text>

  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">
    <rect x="365" y="112" width="250" height="68" rx="22" fill="#385FA8" filter="url(#shadow)"/>
    <text x="490" y="142" font-size="18" font-weight="700" fill="#FFFFFF">你要完成什么任务？</text>
    <text x="490" y="166" font-size="13" fill="#E9F1FF">先选工具形态，再选具体产品</text>

    <g filter="url(#shadow)">
      <rect x="70" y="245" width="250" height="88" rx="22" fill="#FFFFFF" stroke="#D7E4F5"/>
      <text x="195" y="274" font-size="18" font-weight="700" fill="#243B64">日常问答 / 写作 / 总结</text>
      <text x="195" y="302" font-size="13" fill="#5E6D82">ChatGPT / Claude / Gemini</text>
      <text x="195" y="322" font-size="13" fill="#5E6D82">Kimi / 豆包 / 通义 / DeepSeek</text>

      <rect x="365" y="245" width="250" height="88" rx="22" fill="#FFFFFF" stroke="#D7E4F5"/>
      <text x="490" y="274" font-size="18" font-weight="700" fill="#243B64">写代码 / 改项目</text>
      <text x="490" y="302" font-size="13" fill="#5E6D82">Claude Code / Codex</text>
      <text x="490" y="322" font-size="13" fill="#5E6D82">Cursor / Trae / Copilot</text>

      <rect x="660" y="245" width="250" height="88" rx="22" fill="#FFFFFF" stroke="#D7E4F5"/>
      <text x="785" y="274" font-size="18" font-weight="700" fill="#243B64">办公自动化 / 桌面任务</text>
      <text x="785" y="302" font-size="13" fill="#5E6D82">WorkBuddy / OpenClaw</text>
      <text x="785" y="322" font-size="13" fill="#5E6D82">文件、表格、PPT、流程执行</text>

      <rect x="205" y="395" width="250" height="88" rx="22" fill="#FFFFFF" stroke="#D7E4F5"/>
      <text x="330" y="424" font-size="18" font-weight="700" fill="#243B64">构建自己的 Agent</text>
      <text x="330" y="452" font-size="13" fill="#5E6D82">Harness / OpenClaw Skills</text>
      <text x="330" y="472" font-size="13" fill="#5E6D82">MCP / 工具编排 / 评测</text>

      <rect x="525" y="395" width="250" height="88" rx="22" fill="#FFFFFF" stroke="#D7E4F5"/>
      <text x="650" y="424" font-size="18" font-weight="700" fill="#243B64">团队协作 / 可追踪</text>
      <text x="650" y="452" font-size="13" fill="#5E6D82">Trae / Agent Trace / 企业版工具</text>
      <text x="650" y="472" font-size="13" fill="#5E6D82">权限、日志、代码归因、审计</text>
    </g>
  </g>

  <g stroke="#8AA4CC" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M490 180 C490 220 195 210 195 238"/>
    <path d="M490 180 V238"/>
    <path d="M490 180 C490 220 785 210 785 238"/>
    <path d="M490 180 C490 355 330 355 330 388"/>
    <path d="M490 180 C490 355 650 355 650 388"/>
  </g>

  <text x="490" y="528" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#385FA8">新手先用聊天产品；开发者再用编程 Agent；团队最后再考虑 Harness、审计和自动化流程</text>
</svg>
