  <rect x="190" y="362" width="600" height="36" rx="18" fill="#E2EDFF"/>
  <text x="490" y="386" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#385FA8">搜索引擎帮你找资料，大模型帮你处理资料</text>
