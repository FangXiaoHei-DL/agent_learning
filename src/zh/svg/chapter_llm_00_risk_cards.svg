<svg width="980" height="420" viewBox="0 0 980 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#B7C5D8" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="980" height="420" rx="28" fill="#F8FBFF"/>
  <text x="490" y="52" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#243B64">大模型最容易犯的五类错</text>
  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle" filter="url(#shadow)">
    <rect x="70" y="115" width="160" height="105" rx="20" fill="#FFFFFF" stroke="#F1C0C0"/>
    <text x="150" y="152" font-size="30">⚠️</text><text x="150" y="188" font-size="18" font-weight="700" fill="#914044">编造事实</text>
    <rect x="250" y="115" width="160" height="105" rx="20" fill="#FFFFFF" stroke="#F1D8A8"/>
    <text x="330" y="152" font-size="30">🕰️</text><text x="330" y="188" font-size="18" font-weight="700" fill="#8A641A">信息过时</text>
    <rect x="430" y="115" width="160" height="105" rx="20" fill="#FFFFFF" stroke="#F1D8A8"/>
    <text x="510" y="152" font-size="30">🧮</text><text x="510" y="188" font-size="18" font-weight="700" fill="#8A641A">计算错误</text>
    <rect x="610" y="115" width="160" height="105" rx="20" fill="#FFFFFF" stroke="#C9D9EF"/>
    <text x="690" y="152" font-size="30">❓</text><text x="690" y="188" font-size="18" font-weight="700" fill="#385FA8">误解意图</text>
    <rect x="790" y="115" width="160" height="105" rx="20" fill="#FFFFFF" stroke="#C9D9EF"/>
    <text x="870" y="152" font-size="30">📄</text><text x="870" y="188" font-size="18" font-weight="700" fill="#385FA8">格式漂亮</text><text x="870" y="211" font-size="13" fill="#5E6D82">但内容可能错</text>
  </g>
  <rect x="170" y="285" width="640" height="54" rx="27" fill="#FFEFEF"/>
  <text x="490" y="319" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#914044">回答流畅，不代表回答正确；越重要，越要验证</text>
</svg>
