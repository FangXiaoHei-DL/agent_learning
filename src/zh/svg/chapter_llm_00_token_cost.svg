<svg width="980" height="380" viewBox="0 0 980 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5A7BB8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#B7C5D8" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="980" height="380" rx="28" fill="#F8FBFF"/>
  <text x="490" y="52" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#243B64">一次调用的 token 成本从哪里来？</text>
  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle" font-size="16" font-weight="700">
    <g filter="url(#shadow)">
      <rect x="55" y="105" width="160" height="70" rx="18" fill="#FFFFFF" stroke="#D7E4F5"/>
      <text x="135" y="147" fill="#243B64">你的问题</text>
      <rect x="55" y="205" width="160" height="70" rx="18" fill="#FFFFFF" stroke="#D7E4F5"/>
      <text x="135" y="234" fill="#243B64">历史对话</text>
      <text x="135" y="256" fill="#243B64">文档 / 代码</text>
      <rect x="300" y="155" width="160" height="70" rx="18" fill="#E7F0FF" stroke="#BCD0EF"/>
      <text x="380" y="197" fill="#385FA8">输入 token</text>
      <rect x="535" y="140" width="150" height="100" rx="24" fill="#385FA8"/>
      <text x="610" y="184" fill="#FFFFFF">大模型</text>
      <text x="610" y="210" fill="#E9F1FF" font-size="14">处理与生成</text>
      <rect x="760" y="155" width="160" height="70" rx="18" fill="#FFF3D7" stroke="#E9C46A"/>
      <text x="840" y="197" fill="#8A641A">输出 token</text>
    </g>
  </g>
  <g stroke="#5A7BB8" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M215 140 C250 140 255 190 293 190"/>
    <path d="M215 240 C250 240 255 190 293 190"/>
    <path d="M460 190 H527"/>
    <path d="M685 190 H753"/>
  </g>
  <rect x="250" y="305" width="480" height="42" rx="21" fill="#E2EDFF"/>
  <text x="490" y="332" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#385FA8">总成本 ≈ 输入 token 成本 + 输出 token 成本</text>
</svg>
