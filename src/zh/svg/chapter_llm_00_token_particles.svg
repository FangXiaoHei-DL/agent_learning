<svg width="980" height="330" viewBox="0 0 980 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#B7C5D8" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="980" height="330" rx="28" fill="#F8FBFF"/>
  <text x="490" y="54" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#243B64">token：模型眼里的“文字小颗粒”</text>
  <rect x="150" y="105" width="680" height="58" rx="18" fill="#FFFFFF" stroke="#D7E4F5" filter="url(#shadow)"/>
  <text x="490" y="142" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#243B64">我想让大模型帮我总结这篇文章。</text>
  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle" font-size="16" font-weight="600">
    <rect x="88" y="210" width="58" height="42" rx="14" fill="#E7F0FF"/><text x="117" y="237" fill="#385FA8">我</text>
    <rect x="162" y="210" width="58" height="42" rx="14" fill="#E7F0FF"/><text x="191" y="237" fill="#385FA8">想</text>
    <rect x="236" y="210" width="58" height="42" rx="14" fill="#E7F0FF"/><text x="265" y="237" fill="#385FA8">让</text>
    <rect x="310" y="210" width="92" height="42" rx="14" fill="#E7F0FF"/><text x="356" y="237" fill="#385FA8">大模型</text>
    <rect x="418" y="210" width="58" height="42" rx="14" fill="#E7F0FF"/><text x="447" y="237" fill="#385FA8">帮</text>
    <rect x="492" y="210" width="58" height="42" rx="14" fill="#E7F0FF"/><text x="521" y="237" fill="#385FA8">我</text>
    <rect x="566" y="210" width="76" height="42" rx="14" fill="#E7F0FF"/><text x="604" y="237" fill="#385FA8">总结</text>
    <rect x="658" y="210" width="76" height="42" rx="14" fill="#E7F0FF"/><text x="696" y="237" fill="#385FA8">这篇</text>
    <rect x="750" y="210" width="76" height="42" rx="14" fill="#E7F0FF"/><text x="788" y="237" fill="#385FA8">文章</text>
    <rect x="842" y="210" width="50" height="42" rx="14" fill="#E7F0FF"/><text x="867" y="237" fill="#385FA8">。</text>
  </g>
  <text x="490" y="294" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#5E6D82">不需要精确计算，只要记住：输入越长、输出越长，token 越多</text>
</svg>
