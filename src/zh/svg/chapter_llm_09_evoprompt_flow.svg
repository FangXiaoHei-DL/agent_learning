<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L9,4 z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect width="860" height="380" rx="18" fill="#f8fafc"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">EvoPrompt：遗传算法搜索 Prompt</text>
  <text x="430" y="58" text-anchor="middle" font-size="13" fill="#64748b">把 Prompt 当作"基因"，用交叉和变异产生后代，优胜劣汰</text>

  <!-- 初始种群 -->
  <rect x="30" y="90" width="150" height="70" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="105" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">初始种群</text>
  <text x="105" y="133" text-anchor="middle" font-size="10" fill="#2563eb">P₁, P₂, P₃ ...</text>
  <text x="105" y="150" text-anchor="middle" font-size="10" fill="#2563eb">随机或人工 Prompt</text>

  <!-- 评估 -->
  <rect x="220" y="90" width="130" height="70" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="285" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">评估适应度</text>
  <text x="285" y="133" text-anchor="middle" font-size="10" fill="#16a34a">在验证集上</text>
  <text x="285" y="150" text-anchor="middle" font-size="10" fill="#16a34a">给每个 Prompt 打分</text>

  <!-- 交叉 -->
  <rect x="390" y="80" width="140" height="50" rx="12" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="460" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#be185d">交叉 Crossover</text>
  <text x="460" y="120" text-anchor="middle" font-size="10" fill="#db2777">LLM 混合两个 Prompt</text>

  <!-- 变异 -->
  <rect x="390" y="145" width="140" height="50" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="460" y="167" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d28d9">变异 Mutation</text>
  <text x="460" y="185" text-anchor="middle" font-size="10" fill="#7c3aed">LLM 修改单个 Prompt</text>

  <!-- 新种群 -->
  <rect x="570" y="90" width="130" height="70" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="635" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e7490">新候选 Prompt</text>
  <text x="635" y="133" text-anchor="middle" font-size="10" fill="#0891b2">交叉和变异</text>
  <text x="635" y="150" text-anchor="middle" font-size="10" fill="#0891b2">产生的新后代</text>

  <!-- 筛选 -->
  <rect x="740" y="90" width="90" height="70" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="785" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">筛选</text>
  <text x="785" y="133" text-anchor="middle" font-size="10" fill="#b45309">保留最优</text>
  <text x="785" y="150" text-anchor="middle" font-size="10" fill="#b45309">淘汰最差</text>

  <!-- 箭头 -->
  <line x1="180" y1="125" x2="215" y2="125" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="350" y1="105" x2="385" y2="105" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="350" y1="145" x2="385" y2="170" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="530" y1="105" x2="565" y2="105" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="530" y1="170" x2="565" y2="145" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="700" y1="125" x2="735" y2="125" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#arr)"/>

  <!-- 迭代回路 -->
  <path d="M785 160 L785 220 L105 220 L105 165" fill="none" stroke="#4f46e5" stroke-width="2.2" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="440" y="242" text-anchor="middle" font-size="12" fill="#64748b">重复 N 轮进化</text>

  <!-- 底部关键点 -->
  <rect x="30" y="265" width="800" height="95" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="430" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">EvoPrompt 的核心洞察</text>

  <text x="200" y="318" text-anchor="middle" font-size="11" fill="#ec4899">交叉：LLM 把两个 Prompt 的优点合并</text>
  <text x="430" y="318" text-anchor="middle" font-size="11" fill="#8b5cf6">变异：LLM 在一个 Prompt 基础上创造变化</text>
  <text x="660" y="318" text-anchor="middle" font-size="11" fill="#22c55e">筛选：只保留验证集表现更好的</text>

  <text x="430" y="346" text-anchor="middle" font-size="11" fill="#64748b">不需要理解 Prompt 为什么好，只需要能判断哪个好 → 类似黑盒优化</text>
</svg>