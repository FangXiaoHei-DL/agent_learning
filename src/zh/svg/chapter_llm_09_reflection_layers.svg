<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L9,4 z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect width="800" height="420" rx="18" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">反思的三层质量</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#64748b">弱反思只说"错了"，强反思能定位原因并给出修改方案</text>

  <!-- 弱反思 -->
  <rect x="40" y="85" width="220" height="155" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="113" text-anchor="middle" font-size="15" font-weight="bold" fill="#b91c1c">弱反思 ❌</text>

  <rect x="60" y="128" width="180" height="40" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="150" y="152" text-anchor="middle" font-size="12" fill="#b91c1c">现象层：答案错了</text>

  <rect x="60" y="180" width="180" height="40" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <text x="150" y="204" text-anchor="middle" font-size="12" fill="#94a3b8">原因层：（缺失）</text>

  <text x="150" y="245" text-anchor="middle" font-size="11" fill="#b91c1c">"答案错了，应该更准确"</text>
  <text x="150" y="262" text-anchor="middle" font-size="11" fill="#b91c1c">→ 对 Prompt 修改无帮助</text>

  <!-- 中等反思 -->
  <rect x="290" y="85" width="220" height="155" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="113" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">中等反思 ⚠️</text>

  <rect x="310" y="128" width="180" height="40" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="152" text-anchor="middle" font-size="12" fill="#92400e">现象层：答案写错了实体</text>

  <rect x="310" y="180" width="180" height="40" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="204" text-anchor="middle" font-size="12" fill="#92400e">原因层：用了第一篇文档</text>

  <text x="400" y="245" text-anchor="middle" font-size="11" fill="#92400e">"模型优先用了第一篇文档"</text>
  <text x="400" y="262" text-anchor="middle" font-size="11" fill="#92400e">→ 知道错在哪，但不知道怎么改</text>

  <!-- 强反思 -->
  <rect x="540" y="85" width="220" height="155" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="650" y="113" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">强反思 ✅</text>

  <rect x="560" y="128" width="180" height="40" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="650" y="152" text-anchor="middle" font-size="12" fill="#15803d">现象层：实体写错了</text>

  <rect x="560" y="180" width="180" height="40" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="650" y="204" text-anchor="middle" font-size="12" fill="#15803d">原因层：没核对年份匹配</text>

  <text x="650" y="245" text-anchor="middle" font-size="11" fill="#15803d">"修改 reader prompt：</text>
  <text x="650" y="262" text-anchor="middle" font-size="11" fill="#15803d">先匹配年份，再抽取实体"</text>

  <!-- 修改层单独标注 -->
  <rect x="560" y="275" width="180" height="40" rx="8" fill="#86efac" stroke="#22c55e" stroke-width="1.5"/>
  <text x="650" y="299" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">修改层：给出具体改法 ✅</text>

  <!-- 箭头递进 -->
  <line x1="265" y1="160" x2="285" y2="160" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="515" y1="160" x2="535" y2="160" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="650" y1="240" x2="650" y2="270" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 底部总结 -->
  <rect x="80" y="330" width="640" height="70" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">GEPA 依赖的是"修改层"反思</text>
  <text x="400" y="380" text-anchor="middle" font-size="12" fill="#64748b">不仅要定位"哪里错了"，还要给出"Prompt 应该怎么改"的可执行建议</text>
</svg>