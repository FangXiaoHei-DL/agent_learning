<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 330" width="840" height="330" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="840" height="330" rx="18" fill="#f8fafc"/>
  <text x="420" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Prompt 自动调优的发展脉络</text>
  <text x="420" y="58" text-anchor="middle" font-size="13" fill="#64748b">从“让模型写 Prompt”到“让 Agent 根据轨迹持续自我改进”</text>

  <line x1="95" y1="168" x2="745" y2="168" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/>

  <g>
    <circle cx="100" cy="168" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">1</text>
    <rect x="35" y="86" width="130" height="62" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="100" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">APE</text>
    <text x="100" y="130" text-anchor="middle" font-size="11" fill="#2563eb">自动生成 Prompt</text>
  </g>

  <g>
    <circle cx="210" cy="168" r="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="210" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">2</text>
    <rect x="145" y="198" width="130" height="62" rx="10" fill="#f0fdf4" stroke="#86efac"/>
    <text x="210" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">OPRO</text>
    <text x="210" y="242" text-anchor="middle" font-size="11" fill="#16a34a">根据历史分数优化</text>
  </g>

  <g>
    <circle cx="320" cy="168" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="320" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#b45309">3</text>
    <rect x="255" y="86" width="130" height="62" rx="10" fill="#fffbeb" stroke="#fbbf24"/>
    <text x="320" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">ProTeGi / TextGrad</text>
    <text x="320" y="130" text-anchor="middle" font-size="11" fill="#b45309">文本反馈与文本梯度</text>
  </g>

  <g>
    <circle cx="430" cy="168" r="18" fill="#fae8ff" stroke="#d946ef" stroke-width="2"/>
    <text x="430" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#a21caf">4</text>
    <rect x="365" y="198" width="130" height="62" rx="10" fill="#fdf4ff" stroke="#e879f9"/>
    <text x="430" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#86198f">EvoPrompt</text>
    <text x="430" y="242" text-anchor="middle" font-size="11" fill="#a21caf">进化搜索 Prompt</text>
  </g>

  <g>
    <circle cx="540" cy="168" r="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="540" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d28d9">5</text>
    <rect x="475" y="86" width="130" height="62" rx="10" fill="#f5f3ff" stroke="#a78bfa"/>
    <text x="540" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">DSPy / MIPROv2</text>
    <text x="540" y="130" text-anchor="middle" font-size="11" fill="#6d28d9">多模块程序优化</text>
  </g>

  <g>
    <circle cx="650" cy="168" r="18" fill="#cffafe" stroke="#06b6d4" stroke-width="2"/>
    <text x="650" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e7490">6</text>
    <rect x="585" y="198" width="130" height="62" rx="10" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="650" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#155e75">Trace</text>
    <text x="650" y="242" text-anchor="middle" font-size="11" fill="#0891b2">执行轨迹作为信号</text>
  </g>

  <g>
    <circle cx="760" cy="168" r="22" fill="#fee2e2" stroke="#ef4444" stroke-width="2.5"/>
    <text x="760" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">7</text>
    <rect x="695" y="86" width="130" height="62" rx="10" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="760" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">GEPA</text>
    <text x="760" y="130" text-anchor="middle" font-size="11" fill="#dc2626">轨迹反思 + Pareto</text>
  </g>

  <rect x="110" y="286" width="620" height="26" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="420" y="304" text-anchor="middle" font-size="11" fill="#475569">趋势：反馈越来越丰富，优化对象从单个 Prompt 扩展到多模块 Agent 和技能系统</text>
</svg>
